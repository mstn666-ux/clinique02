<!DOCTYPE html>
<html dir="ltr" lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Clinical Les Orangers - Connexion</title>

                    "outline-variant": "#c4c6d0",
                    "on-secondary": "#ffffff",
                    "on-primary-fixed": "#001b3d",
                    "on-secondary-container": "#056380",
                    "on-secondary-fixed-variant": "#004d65",
                    "secondary": "#0d6683",

                    "surface-tint": "#405f91",
                    "inverse-primary": "#a9c7ff",
                    "on-tertiary-fixed": "#121d20",
                    "surface-container-highest": "#e0e3e5",
                    "surface-container-high": "#e6e8ea",
                    "secondary-fixed": "#bee9ff",
                    "inverse-surface": "#2d3133",

<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface">
<nav class="fixed top-0 w-full z-50 bg-[#f7f9fb]/70 backdrop-blur-xl shadow-sm">
<div class="flex justify-between items-center max-w-7xl mx-auto px-8 h-20">
<div class="text-2xl font-bold text-primary tracking-tighter">
                Clinical Les Orangers
            </div>
<div class="flex items-center gap-4">
<a class="text-primary/70 hover:text-secondary font-semibold transition-colors" href="role.html">Retour</a>
<a class="bg-primary text-on-primary px-8 py-3 rounded-full font-semibold transition-all inline-flex items-center justify-center" href="index.html">
                Accueil
            </a>
</div>
</div>
</nav>
<main class="pt-20 min-h-screen bg-surface overflow-hidden">
<section class="relative py-16 lg:py-24">
<div class="absolute inset-0 -z-10">
<div class="absolute top-12 left-6 w-72 h-72 bg-secondary-container/40 rounded-full blur-[90px]"></div>
<div class="absolute bottom-0 right-10 w-80 h-80 bg-primary-fixed/40 rounded-full blur-[110px]"></div>
</div>
<div class="max-w-6xl mx-auto px-8">
<div class="bg-surface-container-lowest rounded-[2rem] border border-white/70 shadow-[0px_22px_48px_rgba(0,27,54,0.08)] overflow-hidden">
<div class="grid xl:grid-cols-[0.88fr_1.12fr]">
<div class="p-8 lg:p-10 bg-gradient-to-br from-surface to-surface-container-low">
<span class="inline-block px-4 py-1.5 rounded-sm bg-secondary-fixed text-on-secondary-fixed-variant text-sm font-bold tracking-widest uppercase" id="login-badge">Connexion</span>
<div class="space-y-4 mt-6">
<h1 class="text-4xl lg:text-5xl font-extrabold text-primary leading-[1.08] tracking-tight" id="login-title">Connectez-vous a votre espace</h1>
<p class="text-base lg:text-lg text-on-surface-variant leading-relaxed" id="login-description">Saisissez vos informations pour acceder rapidement a votre compte.</p>
</div>
</div>
<div class="p-8 lg:p-10">
<div class="flex items-center justify-between gap-4 mb-6">
<div>
<h2 class="text-3xl font-bold text-primary">Connexion</h2>
<p class="text-on-surface-variant mt-2">Entrez vos identifiants ci-dessous.</p>
</div>
<div class="w-16 h-16 rounded-full bg-secondary-fixed flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined text-3xl">login</span>
</div>
</div>
<form class="space-y-5" id="login-form" method="post">
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant" for="email">Email</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="email" name="email" placeholder="utilisateur@example.com" type="email"/>
</div>
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant" for="motdepasse">Mot de passe</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="motdepasse" name="motdepasse" placeholder="Entrez votre mot de passe" type="password"/>
</div>
<label class="flex items-start gap-3 text-sm text-on-surface-variant bg-surface-container-low rounded-2xl px-4 py-4">
<input class="mt-1 w-5 h-5 rounded-md border-outline-variant text-primary focus:ring-primary bg-surface-container-low" type="checkbox"/>
<span>Je confirme que les informations saisies sont correctes.</span>
</label>
<button class="w-full bg-primary text-on-primary py-4 px-8 rounded-full font-bold text-lg hover:shadow-xl shadow-primary/10 transition-all inline-flex items-center justify-center gap-2" type="submit">
                    Se connecter
<span class="material-symbols-outlined text-base">arrow_forward</span>
</button>
<p class="text-sm font-medium text-on-surface-variant" id="login-status"></p>
</form>
<div class="mt-6 text-center text-on-surface-variant">
                Vous n'avez pas encore de compte ?
<a class="text-secondary font-bold hover:text-primary transition-colors ml-1" href="doctor.html" id="signup-alt-link">Creer un compte</a>
</div>
</div>
</div>
</div>
</div>
</section>
</main>
<script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const role = params.get('role') === 'patient' ? 'patient' : 'doctor';
            const config = {
                doctor: {
                    badge: 'Espace Medecin',
                    title: 'Connectez-vous a votre espace medecin',
                    description: 'Saisissez vos informations pour acceder rapidement a votre espace professionnel.',
                    signupHref: 'doctor.html'
                },
                patient: {
                    badge: 'Espace Patient',
                    title: 'Connectez-vous a votre espace patient',
                    description: 'Saisissez vos informations pour acceder a votre suivi et a vos demandes.',
                    signupHref: 'pastien.html'
                }
            }[role];

            document.getElementById('login-badge').textContent = config.badge;
            document.getElementById('login-title').textContent = config.title;
            document.getElementById('login-description').textContent = config.description;
            document.getElementById('signup-alt-link').setAttribute('href', config.signupHref);
            document.title = 'Clinical Les Orangers - ' + config.badge;
        })();
    </script>
<script type="module" src="./app-auth.js"></script>
</body>
</html>
